name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Same as **`make wiki-all`** up through **`pytest`**, then **`make wiki-restore-runtime`** so CI exercises that shortcut too.
      - name: Run unit tests (make wiki-test)
        run: make wiki-test

      # Forks may export VALIDATE_WIKI_ARGS=--strict-citation-meta before make wiki-ci / autopilot.py for tighter citation scaffolding.
      # Forks with a compiled human/site/ export may additionally run: make wiki-static-export-check (requires human/site/meta.json).
      # wiki-quality-gate is optional scaffold glue (skipped dashboard exits 0) and keeps the Makefile entry exercised in Actions.
      - name: Run wiki CI gates
        run: |
          make wiki-ci
          make wiki-quality-gate
